<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="blobs">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="blob blob-4"></div>
            <div class="blob blob-5"></div>

        </div>
        <div class="login">
            <h1 id="title" >Welcome back!</h1>
            <form action="" id="form">
                <label for="uname">Username</label>
                <input type="text" id="uname" placeholder="Enter your Username" required>
                <label for="password">Password</label>
                <input name="password" id="password" placeholder="Enter your password" required>
                <p id="forgot-password"><a href="#" >Forgot password</a></p>
                <button id="submit">Submit</button>
                <p id="sign-up">Don't have an account?<a href="signup.html"> Sign up</a></p>
            </form> 
        </div>
    </div>
</body>
</html>
